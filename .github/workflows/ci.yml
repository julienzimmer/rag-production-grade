# Pipeline d'intégration continue.
#
# Décisions de conception :
# 1. Deux jobs : lint (rapide, sans Docker) → test (avec services).
#    Le lint échoue vite sur les problèmes de style sans attendre le setup
#    plus lourd des tests d'intégration.
# 2. Le job test lance un vrai PostgreSQL+pgvector — pas de mock de la couche DB.
#    Mocker pgvector annulerait l'intérêt de tester la logique de vector search.
# 3. Le rapport de coverage est uploadé vers Codecov : badge portfolio + suivi
#    des régressions dans le temps.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Vérification du style (ruff check)
        run: ruff check .

      - name: Vérification du formatage (ruff format)
        run: ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint                    # Les tests ne tournent que si le lint passe

    services:
      postgres:
        image: ankane/pgvector:v0.7.0
        env:
          POSTGRES_DB: rag_test_db
          POSTGRES_USER: rag_user
          POSTGRES_PASSWORD: rag_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://rag_user:rag_password@localhost:5432/rag_test_db
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: DEBUG

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -e ".[dev]"

      - name: Lancer les tests
        run: pytest tests/ -m "not slow"

      - name: Upload coverage vers Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false   # Ne pas bloquer le CI sur des problèmes réseau Codecov
